name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  playwright:
    name: Run Playwright browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fnbtest
          POSTGRES_PASSWORD: fnbtest
          POSTGRES_DB: fnbtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # ── Database (throwaway CI container — not a secret) ──────────────────
      DATABASE_URL: postgresql://fnbtest:fnbtest@localhost:5432/fnbtest?sslmode=disable

      # ── App ───────────────────────────────────────────────────────────────
      NODE_ENV: test
      PORT: 5000
      BASE_URL: http://localhost:5000
      APP_BASE_URL: http://localhost:5000
      AUTH_MODE: local
      STORAGE_MODE: local

      # ── Auth (CI-only value, not a production secret) ─────────────────────
      SESSION_SECRET: ci-test-session-secret-at-least-32-chars

      # ── Optional secrets — tests that require these are gated behind
      #    skipIfNoOpenAI() / skipIfNoStripe() helpers in tests/helpers/ci-skip.ts.
      #    Set these in GitHub → Settings → Secrets and variables → Actions.
      #    When absent the secret evaluates to an empty string and guarded
      #    tests are skipped automatically rather than failing.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (including devDependencies)
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Push database schema
        run: npx drizzle-kit push --force

      - name: Seed base data (kitchen units, conversions)
        run: npx tsx server/seed.ts

      - name: Seed Playwright test fixtures
        run: npx tsx scripts/ci-seed.ts

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
